<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Học Viên - Bài Thi</title>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --dark: #0f172a;
            --darker: #020617;
            --card: #1e293b;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--darker);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(34, 197, 94, 0.05) 0%, transparent 50%);
        }

        #root {
            min-height: 100vh;
        }

        /* Common Styles */
        input, textarea {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            border-radius: 10px;
            border: 2px solid var(--border);
            background: var(--darker);
            color: var(--text);
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        input::placeholder, textarea::placeholder {
            color: #475569;
        }

        button {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Welcome Screen */
        .welcome-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .welcome-card {
            background: var(--card);
            border-radius: 20px;
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .welcome-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .name-input {
            margin-bottom: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            width: 100%;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        /* Error Message */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            margin-bottom: 1rem;
            font-size: 0.9rem;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Exam Screen */
        .exam-screen {
            min-height: 100vh;
            padding: 20px;
        }

        .exam-header {
            background: var(--card);
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 15px;
        }

        .exam-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .exam-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .exam-name {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .exam-id {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .progress-bar {
            flex: 1;
            max-width: 300px;
            min-width: 200px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .progress-track {
            height: 8px;
            background: var(--darker);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #60a5fa);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* Question Card */
        .question-card {
            background: var(--card);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .question-number {
            display: inline-block;
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1rem;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            line-height: 1.6;
            color: var(--text);
        }

        .choices-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .choice-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            background: var(--darker);
            border: 2px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            gap: 14px;
        }

        .choice-item:hover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
            transform: translateX(5px);
        }

        .choice-item.selected {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .choice-radio {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .choice-item.selected .choice-radio {
            border-color: var(--primary);
            background: var(--primary);
        }

        .choice-radio::after {
            content: '';
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .choice-item.selected .choice-radio::after {
            opacity: 1;
        }

        .choice-label {
            font-size: 1rem;
            color: var(--text);
        }

        /* Navigation Buttons */
        .exam-navigation {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-prev {
            background: rgba(148, 163, 184, 0.1);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-prev:hover {
            background: rgba(148, 163, 184, 0.2);
        }

        .btn-next {
            background: var(--primary);
            color: white;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--success), #16a34a);
            color: white;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .btn-submit:hover {
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
        }

        /* Essay Screen */
        .essay-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .essay-card {
            width: 100%;
            max-width: 950px;
            background: var(--card);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease;
        }

        .essay-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .essay-question {
            background: var(--darker);
            border-radius: 12px;
            padding: 24px;
            line-height: 1.8;
            margin-bottom: 25px;
            color: var(--text);
            border-left: 4px solid var(--primary);
            font-size: 1.05rem;
        }

        .essay-textarea {
            width: 100%;
            height: 250px;
            border-radius: 12px;
            border: 2px solid var(--border);
            padding: 18px;
            font-size: 16px;
            resize: vertical;
            outline: none;
            background: var(--darker);
            color: var(--text);
            font-family: inherit;
            transition: all 0.3s ease;
            line-height: 1.6;
        }

        .essay-textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .essay-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            justify-content: flex-end;
        }

        .btn-essay-submit {
            background: linear-gradient(135deg, var(--success), #16a34a);
            color: white;
            padding: 16px 36px;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .btn-essay-submit:hover {
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
        }

        /* Result Screen */
        .result-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .result-card {
            background: var(--card);
            border-radius: 20px;
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease;
        }

        .result-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }

        .result-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .result-pass {
            color: var(--success);
        }

        .result-fail {
            color: var(--danger);
        }

        .result-score {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .result-message {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Loading Screen */
        .loading-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .welcome-card, .essay-card, .result-card {
                padding: 2rem;
            }

            .exam-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .progress-bar {
                max-width: 100%;
            }

            .exam-navigation {
                flex-direction: column;
            }

            .btn-prev, .btn-next, .btn-submit {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <!-- Load React App -->
    <script type="text/babel" src="./app.jsx"></script>
</body>
</html>
